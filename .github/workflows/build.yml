name: Build

on:
  push:
    branches: [ master, 'modernize/**' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore InventoryKamera.sln

      - name: Build (Release)
        run: dotnet build InventoryKamera.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/InventoryKamera.Tests/InventoryKamera.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'
          if-no-files-found: ignore
